<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Digital Voting System | Cryptographic Validation</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🗳️%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: #050A14; color: #E8F0FF; }
    #app { min-height: 100vh; }
    .loader {
      position: fixed; inset: 0; background: #050A14;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: 16px;
    }
    .loader-icon { font-size: 48px; animation: pulse 1s ease-in-out infinite; }
    .loader-text { font-size: 14px; color: #4B9EFF; letter-spacing: 3px; text-transform: uppercase; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:.7} }
  </style>
</head>
<body>
  <div id="app">
    <div class="loader" id="loader">
      <div class="loader-icon">🗳️</div>
      <div class="loader-text">Initializing Secure System</div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
